# Knowledge library configuration
knowledge_library:
  enabled: true
  library_path: "library/"  # Path to your document library
  
  # Document categories
  categories:
    - name: "economic_theory"
      description: "Books and papers on economics"
      relevance_domains: ["economics", "monetary_policy", "markets"]
      
    - name: "tech_prediction"
      description: "Works on technology trends and forecasting"
      relevance_domains: ["technology", "AI", "innovation"]
      
    - name: "political_theory"
      description: "Political science and policy analysis"
      relevance_domains: ["politics", "policy", "regulation"]
      
    - name: "risk_theory"
      description: "Works on uncertainty, risk, and probability"
      relevance_domains: ["risk", "finance", "probability"]
      
    - name: "personal_notes"
      description: "Your own notes and frameworks"
      relevance_domains: ["all"]  # Applies to all domains
  
  # RAG settings
  rag_settings:
    chunk_size: 512
    chunk_overlap: 128
    top_k_retrieval: 5
    embedding_model: "text-embedding-3-small"  # OpenAI embedding model
    similarity_threshold: 0.5
    
  # Supported document formats
  supported_formats:
    - ".pdf"
    - ".md"
    - ".txt"

# Applicable market categories
# The ideology agent only applies to markets in these categories
applicable_categories:
  - "politics"
  - "economics"
  - "technology"
  - "climate"
  - "regulation"
  - "policy"

# Excluded categories - ideology agent skips these
excluded_markets:
  - "sports"
  - "weather"
  - "entertainment"
  - "celebrities"
  - "pure_chance"

# News integration settings
news_integration:
  enabled: true
  use_existing_rss: true
  max_news_articles: 10
  news_age_hours: 48  # Only use news from last 48 hours
  
  # Interpretation settings
  interpretation:
    filter_through_worldview: true
    identify_confirming_challenges: true
    flag_blind_spots: true

# Calibration tracking
calibration_tracking:
  enabled: true
  min_predictions_before_weight_adjustment: 20
  brier_score_threshold: 0.25  # Target Brier score
  
  # Dynamic weight adjustment (optional)
  dynamic_weighting:
    enabled: false  # Set to true to auto-adjust weight based on calibration
    min_weight: 0.05
    max_weight: 0.30
    
# Logging and review
logging:
  log_all_predictions: true
  log_retrieved_passages: true
  log_news_interpretation: true
  store_divergence_alerts: true