# Worldview Configuration for Ideology Agent
# This file defines your ideological framework, beliefs, and domain expertise
# The Ideology Agent uses this to generate predictions based on your worldview

ideology_agent:
  enabled: true
  
  # Model to use for ideology analysis
  model: "anthropic/claude-sonnet-4.5"
  provider: "openrouter"
  
  # Override trigger settings - when to pause for manual review
  override_triggers:
    min_divergence_from_ensemble: 0.20      # >20% probability difference
    min_worldview_confidence: 0.70          # You have >70% confidence
    min_divergence_from_market: 0.15        # Market differs by >15%
    max_position_size_pct: 0.05             # Position >5% of portfolio
  
  # Confidence inference settings
  confidence_inference:
    enabled: true
    high_confidence_phrases:
      - "will certainly"
      - "inevitably"
      - "must"
      - "definitely"
      - "historically always"
      - "structurally guaranteed"
      - "cannot fail to"
      - "is guaranteed"
    medium_confidence_phrases:
      - "likely"
      - "probably"
      - "expected to"
      - "tends to"
      - "typically"
      - "in most cases"
      - "generally"
      - "usually"
    low_confidence_phrases:
      - "might"
      - "could"
      - "possibly"
      - "may"
      - "uncertain"
      - "unclear"
      - "remains to be seen"
      - "hard to predict"

# Your worldview dimensions - define your frameworks and beliefs
worldview:
  political:
    framework: "hoppean_anarcho_capitalism"
    confidence_in_framework: 0.9
    key_beliefs:
      - "Centralized states are inherently prone to corruption and inefficiency"
      - "Free markets lead to better outcomes than government intervention"
      - "Private property rights are the foundation of a prosperous society"
      - "Keynesian policies create long-term economic distortions even if they provide short-term relief"
      - "Monetarist policies also create distortions and may be less easy to detect than Keynesian ones"
      - "Polities with stronger property right frameworks and less government intervention will tend to outperform others"
      - "The state is ultimately a mafia that behaves in its own self-interest at the expense of its citizens"

  foreign-policy:
    framework: "realist"
    confidence_in_framework: 0.9
    key_beliefs:
      - "International relations are fundamentally driven by power dynamics"
      - "State actors represent to some degree public opinion of the polity they rule over"
      - "Alliances are temporary and formed based on immediate strategic interests"
      - "Great power competition is inevitable in the international system"
      - "Multilateral institutions are useful tools but ultimately constrained by member states' interests"
      - "Regional powers can influence global affairs through strategic positioning"
      - "Geopolitical conflicts are often driven by resource competition and other material constraints as opposed to ideology"
      - "Ideological rulers tend to be short-lived and are replaced with more 'practical' rulers"
      - "States with schizophrenic foreign policies that seem to be against the usual principles tend to suggest either internal political instability or hostile takeover by another group"
    
  economic:
    framework: "austrian_full-reserve_capitalism_with_bitcoin_maximalist_characteristics"
    confidence_in_framework: 0.70
    key_beliefs:
      - "Fractional reserve banking creates artificial booms and inevitable busts"
      - "Bitcoin's fixed supply makes it superior to fiat currency as a store of value"
      - "Government intervention in markets leads to misallocation of resources and long-term harm"
      - "Governments have an interest in central banking"
      - "The Fed's balance sheet expansion is unsustainable and will lead to hyperinflation"
      - "Monetary policy is a zero-sum game where the Fed wins and the public loses"
      - "Cryptocurrency, with the exception of Bitcoin, is a scam waiting to collapse"
    
